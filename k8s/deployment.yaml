apiVersion: apps/v1
kind: Deployment
metadata:
name: hello-flask
labels:
app: hello-flask

spec:
replicas: 2

selector:
matchLabels:
    app: hello-flask

template:
    metadata:
    labels:
    app: hello-flask


    spec:
    containers:
    - name: hello-flask

    image: abramdocker/hello-flask:latest

    imagePullPolicy: Always

    ports:
    - containerPort: 5000

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"

      limits:
        cpu: "250m"
        memory: "256Mi"

    readinessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 5
      periodSeconds: 10

    livenessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 20
