apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-flask
  labels:
    app: hello-flask

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-flask

  template:
    metadata:
      labels:
        app: hello-flask

    spec:
      containers:
      - name: hello-flask
        image: abramdocker/hello-flask:latest
        ports:
        - containerPort: 5000
